<div class="action-bar" role="toolbar" aria-label="Azioni report">

  <!-- Left group -->
  <button class="btn" (click)="refresh.emit()" title="Aggiorna dati" aria-label="Aggiorna dati">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5a5.47 5.47 0 0 1 3.54 1.3L9.5 5.85h4V2l-1.46 1.46A6.9 6.9 0 0 0 8 1.1a6.9 6.9 0 1 0 6.9 6.9h-1.4z"/>
    </svg>
    Aggiorna
  </button>

  <div class="sep" aria-hidden="true"></div>

  <button class="btn"
          (click)="downloadExcel.emit()"
          title="Scarica template Excel"
          aria-label="Scarica template Excel">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 10.5L4.5 7H7V2h2v5h2.5L8 10.5zM2 12h12v1.5H2z"/>
    </svg>
    Download Excel
  </button>

  <button class="btn"
          (click)="uploadExcel.emit()"
          title="Importa file Excel"
          aria-label="Importa file Excel">
    <svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 5.5L11.5 9H9v5H7V9H4.5L8 5.5zM2 2.5h12V4H2z"/>
    </svg>
    Import Excel
  </button>

  <div class="sep" aria-hidden="true"></div>

  <button class="btn"
          (click)="saveDraft.emit()"
          title="Salva bozza"
          aria-label="Salva bozza">
    Salva bozza
  </button>

  <div class="asp"></div>

  <!-- Save indicator (ARIA live region for screen readers) -->
  <div class="save-indicator" [class]="saveClass"
       role="status"
       aria-live="polite"
       aria-atomic="true">
    <span *ngIf="saveState === 'saving'" class="spinner" aria-hidden="true"></span>
    <span *ngIf="saveState === 'saved'" aria-hidden="true">✓</span>
    <span *ngIf="saveState === 'error'" aria-hidden="true">⚠</span>
    <span *ngIf="saveState !== 'idle'">{{ saveLabel }}</span>
    <span *ngIf="saveState === 'idle' && lastSaved" style="font-size:10px;color:#aaa;">
      Ultimo salvataggio: {{ lastSaved | date:'HH:mm:ss' }}
    </span>
  </div>

  <!-- Status badge -->
  <span class="report-status" [class]="statusClass" [attr.title]="'Stato: ' + statusLabel">
    {{ statusLabel }}
  </span>

  <div class="sep" aria-hidden="true"></div>

  <!-- CONTRIBUTOR: Submit (only in DRAFT) -->
  <button class="btn btn--fill"
          *ngIf="reportStatus === 'DRAFT' && isContributor"
          (click)="submitReport.emit()"
          [disabled]="!canSubmit"
          title="Invia al coordinatore"
          aria-label="Invia al coordinatore">
    Invia al coordinatore
  </button>

  <!-- COORDINATOR: Approve / Reject (only when SUBMITTED) -->
  <ng-container *ngIf="reportStatus === 'SUBMITTED' && isCoordinator">
    <button class="btn btn--fill"
            (click)="approveReport.emit()"
            title="Approva report"
            aria-label="Approva report"
            style="background:#388e3c;">
      ✓ Approva
    </button>
    <button class="btn"
            (click)="rejectReport.emit()"
            title="Rifiuta report"
            aria-label="Rifiuta report"
            style="color:#c62828;">
      ✗ Rifiuta
    </button>
  </ng-container>

  <!-- Locked notice when no actions available -->
  <span *ngIf="reportStatus !== 'DRAFT' && reportStatus !== 'SUBMITTED' || (reportStatus === 'DRAFT' && !isContributor) || (reportStatus === 'SUBMITTED' && !isCoordinator)"
        class="btn"
        style="cursor:default;opacity:0.6;"
        [attr.title]="'Report in stato: ' + statusLabel">
    🔒 {{ statusLabel }}
  </span>

</div>
