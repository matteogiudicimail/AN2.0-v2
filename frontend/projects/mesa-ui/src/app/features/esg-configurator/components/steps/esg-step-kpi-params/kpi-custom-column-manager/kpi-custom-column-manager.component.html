<div class="cfg-kpi-custom-cols" role="region" aria-label="Gestione colonne personalizzate">
  <div class="cfg-kpi-custom-cols__header">
    <h4 class="cfg-kpi-custom-cols__title">Colonne Personalizzate</h4>
    <button class="cfg-btn cfg-btn--secondary" (click)="showAddForm = !showAddForm"
            [attr.aria-expanded]="showAddForm">
      + Aggiungi Colonna
    </button>
  </div>

  <div *ngIf="errorMsg" class="cfg-alert cfg-alert--error" role="alert">{{ errorMsg }}</div>

  <!-- Add column form -->
  <form *ngIf="showAddForm" [formGroup]="addForm" (ngSubmit)="addColumn()" novalidate
        class="cfg-kpi-custom-cols__add-form" aria-label="Aggiungi colonna personalizzata">
    <div class="cfg-form-row">
      <div class="cfg-field">
        <label for="cc-name" class="cfg-label">Nome (alfanumerico) *</label>
        <input id="cc-name" class="cfg-input" formControlName="name" placeholder="es. unita_di_misura"
               [class.cfg-input--error]="addForm.get('name')?.invalid && addForm.get('name')?.touched" />
        <span *ngIf="addForm.get('name')?.errors?.['required'] && addForm.get('name')?.touched"
              class="cfg-field__error" role="alert">Obbligatorio</span>
        <span *ngIf="addForm.get('name')?.errors?.['pattern'] && addForm.get('name')?.touched"
              class="cfg-field__error" role="alert">Solo lettere, cifre e underscore</span>
      </div>
      <div class="cfg-field">
        <label for="cc-label" class="cfg-label">Etichetta *</label>
        <input id="cc-label" class="cfg-input" formControlName="label" placeholder="es. Unità di Misura"
               [class.cfg-input--error]="addForm.get('label')?.invalid && addForm.get('label')?.touched" />
        <span *ngIf="addForm.get('label')?.invalid && addForm.get('label')?.touched"
              class="cfg-field__error" role="alert">Obbligatorio</span>
      </div>
      <div class="cfg-field">
        <label for="cc-type" class="cfg-label">Tipo dato</label>
        <select id="cc-type" class="cfg-select" formControlName="dataType">
          <option value="text">Testo</option>
          <option value="number">Numero</option>
          <option value="boolean">Booleano</option>
          <option value="date">Data</option>
        </select>
      </div>
      <div class="cfg-field cfg-field--sm">
        <label for="cc-width" class="cfg-label">Larghezza (px)</label>
        <input id="cc-width" class="cfg-input" formControlName="width" type="number" min="40" max="600"
               placeholder="es. 120" />
      </div>
    </div>
    <div class="cfg-kpi-custom-cols__form-actions">
      <button type="submit" class="cfg-btn cfg-btn--primary">Aggiungi</button>
      <button type="button" class="cfg-btn cfg-btn--ghost" (click)="showAddForm = false">Annulla</button>
    </div>
  </form>

  <!-- Column list -->
  <div *ngIf="defs.length > 0" class="cfg-kpi-custom-cols__list">
    <table class="cfg-table" aria-label="Colonne personalizzate definite">
      <thead>
        <tr>
          <th scope="col">Nome</th>
          <th scope="col">Etichetta</th>
          <th scope="col">Tipo</th>
          <th scope="col">Larghezza</th>
          <th scope="col" aria-label="Azioni"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of defs; let i = index; trackBy: trackByName">
          <td><code>{{ d.name }}</code></td>
          <td>{{ d.label }}</td>
          <td>{{ d.dataType }}</td>
          <td>{{ d.width ?? '—' }}</td>
          <td>
            <button class="cfg-btn-icon cfg-btn-icon--danger" (click)="removeColumn(i)"
                    [attr.aria-label]="'Rimuovi colonna ' + d.label">🗑</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="defs.length === 0" class="cfg-kpi-custom-cols__empty">
    Nessuna colonna personalizzata definita.
  </div>

  <div class="cfg-kpi-custom-cols__footer">
    <button class="cfg-btn cfg-btn--primary" [disabled]="isSaving" (click)="save()">
      {{ isSaving ? 'Salvataggio…' : 'Salva Colonne' }}
    </button>
    <button class="cfg-btn cfg-btn--ghost" (click)="cancelled.emit()">Annulla</button>
  </div>
</div>
