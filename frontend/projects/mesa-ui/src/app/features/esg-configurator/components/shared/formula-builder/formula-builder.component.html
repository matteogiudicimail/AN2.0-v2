<div class="cfg-fb" role="dialog" aria-modal="true" [attr.aria-label]="'Editor formula per ' + rowLabel">

  <div class="cfg-fb__header">
    <span class="cfg-fb__title">ƒ Formula Builder</span>
    <span *ngIf="rowLabel" class="cfg-fb__row-label">— {{ rowLabel }}</span>
  </div>

  <!-- ── Reference chips ── -->
  <div class="cfg-fb__refs-section" aria-label="Riferimenti disponibili">
    <div class="cfg-fb__refs-toolbar">
      <span class="cfg-fb__refs-label">Riferimenti ({{ availableRefs.length }})</span>
      <input class="cfg-fb__refs-search"
             type="text"
             [(ngModel)]="refSearch"
             placeholder="Cerca riferimenti…"
             aria-label="Cerca riferimenti" />
    </div>
    <div class="cfg-fb__refs">
      <button *ngFor="let ref of filteredRefs"
              type="button"
              class="cfg-fb__ref-chip"
              (click)="insertRef(ref)"
              [attr.aria-label]="'Inserisci riferimento ' + ref"
              title="Clicca per inserire [{{ ref }}]">
        [{{ ref }}]
      </button>
      <span *ngIf="!filteredRefs.length" class="cfg-fb__refs-empty">
        {{ availableRefs.length ? 'Nessun risultato' : 'Nessun riferimento disponibile' }}
      </span>
    </div>
  </div>

  <!-- ── Operator buttons ── -->
  <div class="cfg-fb__ops" role="group" aria-label="Operatori">
    <button *ngFor="let op of OPERATORS"
            type="button"
            class="cfg-fb__op-btn"
            (click)="insertOperator(op)"
            [attr.aria-label]="'Inserisci operatore ' + op">
      {{ op }}
    </button>
    <button type="button" class="cfg-fb__op-btn" (click)="insertParen('(')" aria-label="Inserisci parentesi aperta">(</button>
    <button type="button" class="cfg-fb__op-btn" (click)="insertParen(')')" aria-label="Inserisci parentesi chiusa">)</button>
    <button type="button" class="cfg-fb__op-btn cfg-fb__op-btn--back" (click)="backspace()" aria-label="Elimina ultimo token">⌫</button>
    <button type="button" class="cfg-fb__op-btn cfg-fb__op-btn--clear" (click)="clearFormula()" aria-label="Cancella formula">✕</button>
  </div>

  <!-- ── Formula textarea ── -->
  <div class="cfg-fb__formula-wrap">
    <label class="cfg-fb__formula-label" for="cfg-fb-textarea">Formula</label>
    <textarea
      id="cfg-fb-textarea"
      class="cfg-fb__formula-area"
      [class.cfg-fb__formula-area--valid]="isValid"
      [class.cfg-fb__formula-area--invalid]="validationError"
      [(ngModel)]="formula"
      (input)="onFormulaInput()"
      rows="2"
      placeholder="Esempio: [Ricavi] - [Costi]"
      spellcheck="false"
      aria-describedby="cfg-fb-hint cfg-fb-error"
    ></textarea>
    <div id="cfg-fb-hint" class="cfg-fb__hint">
      Usa <code>[NomeRiferimento]</code> per i valori di riga. Supporta +, -, *, /, parentesi e numeri.
    </div>
    <!-- Validation feedback — role="alert" for screen-reader announcement -->
    <div *ngIf="validationError"
         id="cfg-fb-error"
         class="cfg-fb__error"
         role="alert">
      ⚠ {{ validationError }}
    </div>
    <div *ngIf="isValid && formula"
         class="cfg-fb__ok"
         role="status">
      ✓ Formula valida
    </div>
  </div>

  <!-- ── Azioni ── -->
  <div class="cfg-fb__actions">
    <button type="button"
            class="cfg-btn cfg-btn--primary cfg-btn--sm"
            [disabled]="!isValid"
            (click)="save()"
            aria-label="Salva formula">
      💾 Salva formula
    </button>
    <button type="button"
            class="cfg-btn cfg-btn--ghost cfg-btn--sm"
            (click)="cancel()"
            aria-label="Annulla">
      Annulla
    </button>
  </div>

</div>
